<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Digital Health Twin — AI Clinical Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #060c18;
    --bg2:       #0b1628;
    --bg3:       #0f1e38;
    --border:    rgba(0,212,255,0.12);
    --cyan:      #00d4ff;
    --cyan-dim:  rgba(0,212,255,0.15);
    --cyan-glow: rgba(0,212,255,0.35);
    --amber:     #ffab00;
    --red:       #ff4560;
    --green:     #00e396;
    --text:      #c8dff5;
    --text-dim:  #5a7a9a;
    --mono:      'Space Mono', monospace;
    --sans:      'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---------- grid bg ---------- */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* ---------- scanline ---------- */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 0;
  }

  /* ---------- header ---------- */
  header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 40px;
    border-bottom: 1px solid var(--border);
    background: rgba(6,12,24,0.9);
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex; align-items: center; gap: 14px;
  }

  .logo-icon {
    width: 38px; height: 38px;
    border: 2px solid var(--cyan);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    box-shadow: 0 0 16px var(--cyan-glow);
    animation: pulse-border 3s ease-in-out infinite;
  }

  .logo-icon svg { width: 20px; height: 20px; }

  @keyframes pulse-border {
    0%,100% { box-shadow: 0 0 16px var(--cyan-glow); }
    50%      { box-shadow: 0 0 32px var(--cyan-glow), 0 0 64px rgba(0,212,255,0.15); }
  }

  .logo h1 {
    font-family: var(--sans);
    font-size: 17px; font-weight: 800;
    letter-spacing: 0.04em;
    color: #fff;
  }

  .logo span {
    display: block;
    font-family: var(--mono);
    font-size: 10px; font-weight: 400;
    color: var(--cyan);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .header-status {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-dim);
  }
  .dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); animation: blink 2s ease-in-out infinite; }
  .dot.offline { background: var(--red); }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ---------- API config bar ---------- */
  .api-bar {
    position: relative; z-index: 10;
    display: flex; align-items: center; gap: 12px;
    padding: 12px 40px;
    background: rgba(11,22,40,0.95);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }

  .api-bar label { color: var(--cyan); letter-spacing: 0.1em; white-space: nowrap; }

  .api-bar input {
    flex: 1; max-width: 400px;
    background: rgba(0,212,255,0.06);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .api-bar input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px var(--cyan-dim);
  }

  .btn-test {
    background: var(--cyan-dim);
    border: 1px solid var(--cyan);
    color: var(--cyan);
    border-radius: 6px;
    padding: 7px 16px;
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s;
    letter-spacing: 0.06em;
  }
  .btn-test:hover { background: rgba(0,212,255,0.25); box-shadow: 0 0 12px var(--cyan-glow); }

  /* ---------- main layout ---------- */
  main {
    position: relative; z-index: 5;
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 0;
    min-height: calc(100vh - 110px);
  }

  /* ---------- tabs ---------- */
  .tabs {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    background: rgba(6,12,24,0.5);
    position: relative; z-index: 10;
    grid-column: 1 / -1;
  }

  .tab {
    padding: 14px 24px;
    font-size: 12px; letter-spacing: 0.1em;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    display: flex; align-items: center; gap: 8px;
  }

  .tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab:hover:not(.active) { color: var(--text); }

  /* ---------- panel ---------- */
  .panel {
    padding: 32px 40px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    max-height: calc(100vh - 160px);
  }

  .panel-right {
    padding: 32px 40px;
    overflow-y: auto;
    max-height: calc(100vh - 160px);
  }

  /* ---------- section title ---------- */
  .sec-title {
    font-family: var(--sans);
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .sec-title::after {
    content: ''; flex: 1; height: 1px;
    background: var(--border);
  }

  /* ---------- form ---------- */
  .form-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
    margin-bottom: 20px;
  }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field.full { grid-column: 1 / -1; }

  .field label {
    font-size: 10px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text-dim);
  }

  .field input, .field select, .field textarea {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 13px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }

  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px var(--cyan-dim);
  }

  .field select option { background: var(--bg2); }

  .field textarea { resize: vertical; min-height: 70px; }

  /* toggle row */
  .toggle-row {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .toggle-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--text-dim);
    cursor: pointer; user-select: none;
  }

  .toggle-item input[type=checkbox] { display: none; }

  .toggle-box {
    width: 38px; height: 20px;
    border-radius: 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    position: relative;
    transition: background 0.25s, border-color 0.25s;
  }
  .toggle-box::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--text-dim);
    top: 2px; left: 2px;
    transition: transform 0.25s, background 0.25s;
  }
  .toggle-item input:checked ~ .toggle-box { background: var(--cyan-dim); border-color: var(--cyan); }
  .toggle-item input:checked ~ .toggle-box::after { transform: translateX(18px); background: var(--cyan); }

  /* submit btn */
  .btn-primary {
    width: 100%;
    background: var(--cyan);
    color: #060c18;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: var(--sans);
    font-size: 14px; font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: opacity 0.2s, box-shadow 0.2s, transform 0.1s;
    margin-top: 8px;
  }
  .btn-primary:hover { opacity: 0.9; box-shadow: 0 0 24px var(--cyan-glow); }
  .btn-primary:active { transform: scale(0.99); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ---------- results ---------- */
  .empty-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 60%;
    gap: 16px;
    color: var(--text-dim);
  }

  .empty-icon {
    width: 72px; height: 72px;
    border: 2px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.4;
  }

  .empty-state p { font-size: 12px; letter-spacing: 0.06em; }

  /* risk badge */
  .risk-badge {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 10px 20px;
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 20px; font-weight: 800;
    letter-spacing: 0.04em;
    margin-bottom: 24px;
  }
  .risk-badge.HIGH  { background: rgba(255,69,96,0.15);  border: 1px solid rgba(255,69,96,0.4);  color: var(--red);   box-shadow: 0 0 20px rgba(255,69,96,0.2); }
  .risk-badge.LOW   { background: rgba(0,227,150,0.12);  border: 1px solid rgba(0,227,150,0.35); color: var(--green); box-shadow: 0 0 20px rgba(0,227,150,0.15); }

  /* confidence bar */
  .conf-wrap { margin-bottom: 28px; }
  .conf-label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; margin-bottom: 8px; display: flex; justify-content: space-between; }
  .conf-label span { color: var(--cyan); font-weight: 700; }

  .conf-track {
    height: 6px; background: var(--bg3); border-radius: 4px; overflow: hidden;
  }
  .conf-fill {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, var(--cyan), #7b2fff);
    transition: width 0.8s cubic-bezier(.23,1,.32,1);
  }

  /* insight card */
  .insight-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    position: relative; overflow: hidden;
  }
  .insight-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--cyan), #7b2fff);
  }

  .card-label {
    font-size: 10px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--text-dim);
    margin-bottom: 10px;
  }

  .card-text {
    font-size: 12px; line-height: 1.8;
    color: var(--text);
  }

  /* context cards */
  .context-list { display: flex; flex-direction: column; gap: 10px; }

  .ctx-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex; align-items: flex-start; gap: 14px;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .ctx-rank {
    font-size: 10px; color: var(--bg);
    background: var(--cyan);
    width: 22px; height: 22px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; flex-shrink: 0;
    font-family: var(--sans);
  }

  .ctx-body { flex: 1; }

  .ctx-pid { font-size: 11px; color: var(--cyan); margin-bottom: 4px; }
  .ctx-sim {
    font-size: 10px; color: var(--text-dim); margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .sim-bar { flex: 1; height: 3px; background: var(--bg); border-radius: 2px; overflow: hidden; }
  .sim-fill { height: 100%; background: var(--cyan); border-radius: 2px; }
  .ctx-text { font-size: 11px; color: var(--text-dim); line-height: 1.6; }

  /* ask panel */
  .ask-wrap { display: flex; flex-direction: column; gap: 14px; }

  .chat-area {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    min-height: 200px;
    max-height: 400px;
    overflow-y: auto;
    margin-bottom: 8px;
  }

  .chat-msg {
    margin-bottom: 16px;
    animation: fadeUp 0.3s ease both;
  }
  .chat-msg .label { font-size: 10px; letter-spacing: 0.12em; color: var(--text-dim); margin-bottom: 6px; }
  .chat-msg.user .label { color: var(--cyan); }
  .chat-msg .bubble {
    background: var(--bg3);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 12px; line-height: 1.7;
  }
  .chat-msg.user .bubble { background: var(--cyan-dim); border: 1px solid rgba(0,212,255,0.2); }
  .chat-msg.ai .bubble { border: 1px solid var(--border); }

  /* spinner */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-row { display: flex; align-items: center; gap: 10px; color: var(--text-dim); font-size: 11px; }

  /* error */
  .error-msg {
    background: rgba(255,69,96,0.1);
    border: 1px solid rgba(255,69,96,0.3);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 12px;
    color: var(--red);
    margin-bottom: 16px;
  }

  /* responsive */
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
    .panel { border-right: none; border-bottom: 1px solid var(--border); max-height: none; }
    .panel-right { max-height: none; }
    header { padding: 14px 20px; }
    .api-bar { padding: 10px 20px; }
    .tabs { padding: 0 20px; }
    .panel, .panel-right { padding: 24px 20px; }
  }

  /* content tab views */
  .tab-content { display: none; grid-column: 1 / -1; }
  .tab-content.active { display: contents; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
    </div>
    <h1>Digital Health Twin <span>AI Clinical Dashboard · v1.0</span></h1>
  </div>
  <div class="header-status">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">CHECKING API...</span>
  </div>
</header>

<div class="api-bar">
  <label>API_BASE</label>
  <input type="text" id="api-url" value="http://localhost:8000" placeholder="https://your-api.amazonaws.com"/>
  <button class="btn-test" onclick="checkHealth()">PING</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('predict')">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    PREDICT RISK
  </div>
  <div class="tab" onclick="switchTab('ask')">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    CLINICAL Q&A
  </div>
</div>

<main>
  <!-- ===== PREDICT TAB ===== -->
  <div class="tab-content active" id="tab-predict">
    <div class="panel">
      <div class="sec-title">Patient Data</div>

      <div class="form-grid">
        <div class="field full">
          <label>Patient ID</label>
          <input type="text" id="patient_id" value="P9999" placeholder="P0001"/>
        </div>
        <div class="field">
          <label>Age (years)</label>
          <input type="number" id="age" value="65" min="1" max="120"/>
        </div>
        <div class="field">
          <label>Gender</label>
          <select id="gender">
            <option value="M">Male</option>
            <option value="F">Female</option>
          </select>
        </div>
        <div class="field">
          <label>BMI</label>
          <input type="number" id="bmi" value="33.5" step="0.1" min="10" max="60"/>
        </div>
        <div class="field">
          <label>Heart Rate (bpm)</label>
          <input type="number" id="heart_rate" value="84" min="30" max="250"/>
        </div>
        <div class="field">
          <label>Systolic BP (mmHg)</label>
          <input type="number" id="systolic_bp" value="155" min="60" max="300"/>
        </div>
        <div class="field">
          <label>Diastolic BP (mmHg)</label>
          <input type="number" id="diastolic_bp" value="96" min="40" max="200"/>
        </div>
        <div class="field">
          <label>Glucose (mg/dL)</label>
          <input type="number" id="glucose" value="142.0" step="0.1"/>
        </div>
        <div class="field">
          <label>Cholesterol (mg/dL)</label>
          <input type="number" id="cholesterol" value="230.0" step="0.1"/>
        </div>
        <div class="field full">
          <label>Activity Level</label>
          <select id="activity_level">
            <option value="low">Low</option>
            <option value="moderate">Moderate</option>
            <option value="high">High</option>
          </select>
        </div>
      </div>

      <div class="sec-title">Flags</div>
      <div class="toggle-row">
        <label class="toggle-item">
          <input type="checkbox" id="smoking" checked/>
          <div class="toggle-box"></div>
          Smoker
        </label>
        <label class="toggle-item">
          <input type="checkbox" id="diabetes" checked/>
          <div class="toggle-box"></div>
          Diabetic
        </label>
      </div>

      <div class="sec-title">Clinical Notes</div>
      <div class="field" style="margin-bottom:20px">
        <textarea id="notes" placeholder="Complaints of fatigue and chest tightness..."></textarea>
      </div>

      <button class="btn-primary" id="predict-btn" onclick="runPredict()">RUN PREDICTION</button>
    </div>

    <div class="panel-right" id="predict-result">
      <div class="empty-state">
        <div class="empty-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </div>
        <p>SUBMIT PATIENT DATA TO GENERATE PREDICTION</p>
      </div>
    </div>
  </div>

  <!-- ===== ASK TAB ===== -->
  <div class="tab-content" id="tab-ask">
    <div class="panel">
      <div class="sec-title">Patient Context</div>
      <div class="form-grid">
        <div class="field full">
          <label>Patient ID</label>
          <input type="text" id="ask_patient_id" value="P9999"/>
        </div>
        <div class="field">
          <label>Age</label>
          <input type="number" id="ask_age" value="65"/>
        </div>
        <div class="field">
          <label>Gender</label>
          <select id="ask_gender">
            <option value="M">Male</option>
            <option value="F">Female</option>
          </select>
        </div>
        <div class="field">
          <label>BMI</label>
          <input type="number" id="ask_bmi" value="33.5" step="0.1"/>
        </div>
        <div class="field">
          <label>Heart Rate</label>
          <input type="number" id="ask_heart_rate" value="84"/>
        </div>
        <div class="field">
          <label>Systolic BP</label>
          <input type="number" id="ask_systolic_bp" value="155"/>
        </div>
        <div class="field">
          <label>Diastolic BP</label>
          <input type="number" id="ask_diastolic_bp" value="96"/>
        </div>
        <div class="field">
          <label>Glucose</label>
          <input type="number" id="ask_glucose" value="142.0" step="0.1"/>
        </div>
        <div class="field">
          <label>Cholesterol</label>
          <input type="number" id="ask_cholesterol" value="230.0" step="0.1"/>
        </div>
        <div class="field full">
          <label>Activity Level</label>
          <select id="ask_activity_level">
            <option value="low">Low</option>
            <option value="moderate">Moderate</option>
            <option value="high">High</option>
          </select>
        </div>
      </div>

      <div class="sec-title">Question</div>
      <div class="field" style="margin-bottom:20px">
        <textarea id="question" rows="3" placeholder="What should a doctor check next for this patient?"></textarea>
      </div>

      <button class="btn-primary" id="ask-btn" onclick="runAsk()">SEND QUERY</button>
    </div>

    <div class="panel-right">
      <div class="sec-title">Chat</div>
      <div class="chat-area" id="chat-area">
        <div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);font-size:11px;letter-spacing:0.08em;">
          AWAITING CLINICAL QUERY...
        </div>
      </div>
    </div>
  </div>
</main>

<script>
  const API = () => document.getElementById('api-url').value.replace(/\/$/, '');

  // ---- health check ----
  async function checkHealth() {
    const dot  = document.getElementById('status-dot');
    const txt  = document.getElementById('status-text');
    dot.className = 'dot';
    txt.textContent = 'CHECKING...';
    try {
      const r = await fetch(API() + '/health', { signal: AbortSignal.timeout(5000) });
      if (r.ok) {
        dot.className = 'dot online';
        txt.textContent = 'API ONLINE';
      } else throw new Error();
    } catch {
      dot.className = 'dot offline';
      txt.textContent = 'API OFFLINE';
    }
  }
  checkHealth();

  // ---- tab switch ----
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['predict','ask'][i] === name));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
  }

  // ---- predict ----
  async function runPredict() {
    const btn = document.getElementById('predict-btn');
    const res = document.getElementById('predict-result');
    btn.disabled = true;
    btn.textContent = 'RUNNING...';

    res.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:200px">
      <div class="loading-row"><div class="spinner"></div> ANALYSING PATIENT DATA...</div></div>`;

    const body = {
      patient_id:    document.getElementById('patient_id').value,
      age:           +document.getElementById('age').value,
      gender:        document.getElementById('gender').value,
      bmi:           +document.getElementById('bmi').value,
      systolic_bp:   +document.getElementById('systolic_bp').value,
      diastolic_bp:  +document.getElementById('diastolic_bp').value,
      heart_rate:    +document.getElementById('heart_rate').value,
      glucose:       +document.getElementById('glucose').value,
      cholesterol:   +document.getElementById('cholesterol').value,
      activity_level:document.getElementById('activity_level').value,
      smoking:       document.getElementById('smoking').checked ? 1 : 0,
      diabetes:      document.getElementById('diabetes').checked ? 1 : 0,
      notes:         document.getElementById('notes').value,
    };

    try {
      const r = await fetch(API() + '/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
        signal: AbortSignal.timeout(30000),
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d = await r.json();
      renderPredict(res, d);
    } catch (e) {
      res.innerHTML = `<div class="error-msg">⚠ ${e.message || 'Failed to connect to API. Check the API_BASE URL above.'}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'RUN PREDICTION';
    }
  }

  function renderPredict(el, d) {
    const conf = Math.round((d.confidence || 0) * 100);
    const ctx  = (d.retrieved_context || []).map((c, i) => {
      const sim = Math.round((c.similarity || 0) * 100);
      return `
        <div class="ctx-card" style="animation-delay:${i * 0.1}s">
          <div class="ctx-rank">${i + 1}</div>
          <div class="ctx-body">
            <div class="ctx-pid">${c.patient_id || 'P???'}</div>
            <div class="ctx-sim">
              SIMILARITY
              <div class="sim-bar"><div class="sim-fill" style="width:${sim}%"></div></div>
              ${sim}%
            </div>
            <div class="ctx-text">${c.summary || ''}</div>
          </div>
        </div>`;
    }).join('');

    el.innerHTML = `
      <div>
        <div class="risk-badge ${d.risk_level}">
          ${d.risk_level === 'HIGH'
            ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`
            : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`
          }
          ${d.risk_level} RISK
        </div>

        <div class="conf-wrap">
          <div class="conf-label">CONFIDENCE SCORE <span>${conf}%</span></div>
          <div class="conf-track"><div class="conf-fill" style="width:${conf}%"></div></div>
        </div>

        <div class="insight-card">
          <div class="card-label">AI CLINICAL INSIGHT</div>
          <div class="card-text">${d.explanation || 'No explanation returned.'}</div>
        </div>

        ${ctx ? `
          <div class="sec-title" style="margin-top:24px">Similar Cases Retrieved</div>
          <div class="context-list">${ctx}</div>
        ` : ''}
      </div>`;
  }

  // ---- ask ----
  const chatHistory = [];

  async function runAsk() {
    const q = document.getElementById('question').value.trim();
    if (!q) return;
    const btn  = document.getElementById('ask-btn');
    const chat = document.getElementById('chat-area');

    chatHistory.push({ role: 'user', text: q });
    renderChat(chat);
    document.getElementById('question').value = '';
    btn.disabled = true;

    // append loading bubble
    const loadId = 'load-' + Date.now();
    chat.innerHTML += `<div class="chat-msg ai" id="${loadId}">
      <div class="label">AI ASSISTANT</div>
      <div class="bubble"><div class="loading-row"><div class="spinner"></div> THINKING...</div></div>
    </div>`;
    chat.scrollTop = chat.scrollHeight;

    const patientData = {
      patient_id:    document.getElementById('ask_patient_id').value,
      age:           +document.getElementById('ask_age').value,
      gender:        document.getElementById('ask_gender').value,
      bmi:           +document.getElementById('ask_bmi').value,
      systolic_bp:   +document.getElementById('ask_systolic_bp').value,
      diastolic_bp:  +document.getElementById('ask_diastolic_bp').value,
      heart_rate:    +document.getElementById('ask_heart_rate').value,
      glucose:       +document.getElementById('ask_glucose').value,
      cholesterol:   +document.getElementById('ask_cholesterol').value,
      activity_level:document.getElementById('ask_activity_level').value,
      smoking: 0, diabetes: 0, notes: '',
    };

    try {
      const r = await fetch(API() + '/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          patient_id: patientData.patient_id,
          question: q,
          patient_data: patientData,
        }),
        signal: AbortSignal.timeout(30000),
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d = await r.json();
      chatHistory.push({ role: 'ai', text: d.answer || 'No answer returned.' });
    } catch (e) {
      chatHistory.push({ role: 'ai', text: '⚠ ' + (e.message || 'Connection error.'), error: true });
    }

    renderChat(chat);
    btn.disabled = false;
    chat.scrollTop = chat.scrollHeight;
  }

  function renderChat(chat) {
    chat.innerHTML = chatHistory.map(m => `
      <div class="chat-msg ${m.role}">
        <div class="label">${m.role === 'user' ? 'YOU' : 'AI ASSISTANT'}</div>
        <div class="bubble${m.error ? '" style="color:var(--red)' : ''}">${m.text}</div>
      </div>`).join('');
  }

  // allow Enter in question field
  document.getElementById('question').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); runAsk(); }
  });
</script>
</body>
</html>
