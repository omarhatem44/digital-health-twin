name: CI — Digital Health Twin

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION:       us-east-1
  ECR_REPO:         digital-health-twin
  ECS_CLUSTER:      health-twin-cluster
  ECS_SERVICE:      health-twin-api
  CONTAINER_NAME:   health-twin-api        # must match name in your task definition

jobs:
  # ── 1. Lint + Test ─────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # cache pip so repeat runs are fast
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt pytest ruff --quiet

      - name: Lint (ruff)
        run: ruff check src/

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python src/pipeline/generate_data.py
          python src/pipeline/preprocess.py
          python src/pipeline/feature_engineering.py
          python src/models/baseline.py
          python src/models/advanced.py
          python src/rag/embeddings.py
          python src/rag/vector_store.py

      - name: Run tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: pytest tests/ -v --tb=short

  # ── 2. Build & Push to ECR ─────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main'

    outputs:
      image: ${{ steps.build-push.outputs.image }}   # pass full image URI to deploy job

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build-push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI=$REGISTRY/${{ env.ECR_REPO }}:${{ github.sha }}

          docker build -t $IMAGE_URI .

          # also tag as latest so you can always pull the freshest build
          docker tag $IMAGE_URI $REGISTRY/${{ env.ECR_REPO }}:latest

          docker push $IMAGE_URI
          docker push $REGISTRY/${{ env.ECR_REPO }}:latest

          # expose the versioned URI to the deploy job
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

  # ── 3. Deploy to ECS ───────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # 1. pull the CURRENT task definition from AWS
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_SERVICE }} \
            --query taskDefinition \
            > task-definition.json

      # 2. inject the NEW image URI into the task definition JSON
      #    (this is the step that was missing — without it ECS keeps the old image)
      - name: Render new task definition with updated image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  task-definition.json
          container-name:   ${{ env.CONTAINER_NAME }}
          image:            ${{ needs.build.outputs.image }}

      # 3. register the new task definition revision and update the service
      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:  ${{ steps.render-task-def.outputs.task-definition }}
          service:          ${{ env.ECS_SERVICE }}
          cluster:          ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true   # block until deployment is healthy