stages:
  generate:
    cmd: python src/pipeline/generate_data.py
    deps:
      - src/pipeline/generate_data.py
    outs:
      - data/raw/patients.csv

  preprocess:
    cmd: python src/pipeline/preprocess.py
    deps:
      - src/pipeline/preprocess.py
      - data/raw/patients.csv
    outs:
      - data/processed/patients_processed.csv

  featurize:
    cmd: python src/pipeline/feature_engineering.py
    deps:
      - src/pipeline/feature_engineering.py
      - data/processed/patients_processed.csv
    outs:
      - data/processed/scaler.pkl

  train:
    cmd: python src/models/advanced.py
    deps:
      - src/models/advanced.py
      - data/processed/patients_processed.csv
      - data/processed/scaler.pkl
    outs:
      - data/processed/xgb_model.pkl
    metrics:
      - data/processed/metrics.json